<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial,sans-serif;
}

body{
    background:#0f0f0f;
    color:white;
    min-height:100vh;
}

.header{
    text-align:center;
    padding:25px 15px;
}

.header h1{
    font-size:32px;
    font-weight:800;
}

.container{
    width:95%;
    max-width:900px;
    margin:auto;
}

.video-box{
    position:relative;
    width:100%;
    aspect-ratio:16/9;
    border-radius:15px;
    overflow:hidden;
    background:#000;
    box-shadow:0 0 25px rgba(255,255,255,.1);
}

.video-box img{
    width:100%;
    height:100%;
    object-fit:cover;
}

.play-overlay{
    position:absolute;
    inset:0;
    display:flex;
    justify-content:center;
    align-items:center;
    background:rgba(0,0,0,.35);
}

.play-btn{
    width:90px;
    height:90px;
    border-radius:50%;
    border:none;
    background:#ff0000;
    color:white;
    font-size:34px;
    cursor:pointer;
    box-shadow:0 0 30px rgba(255,0,0,.8);
}

.loader{
    display:none;
    width:70px;
    height:70px;
    border:6px solid rgba(255,255,255,.3);
    border-top:6px solid #fff;
    border-radius:50%;
    animation:spin 1s linear infinite;
}

@keyframes spin{
    100%{
        transform:rotate(360deg);
    }
}

.banner{
    margin-top:20px;
    background:#1e1e1e;
    border-radius:10px;
    text-align:center;
    padding:15px;
    min-height:90px;
}

.banner span{
    color:#aaa;
}

.popup{
    position:fixed;
    inset:0;
    background:rgba(0,0,0,.8);
    display:none;
    justify-content:center;
    align-items:center;
    z-index:9999;
}

.popup-content{
    background:white;
    color:black;
    width:90%;
    max-width:400px;
    padding:25px;
    border-radius:12px;
    text-align:center;
}

.close-btn{
    margin-top:15px;
    padding:10px 20px;
    border:none;
    background:#111;
    color:white;
    cursor:pointer;
    border-radius:5px;
}
</style>
